services:
  hermes:
    build:
      context: .
      target: development
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - /home/ubuntu/wallet:/wallet:ro
      - /home/ubuntu/docs:/data:ro
      - models-cache:/root/.cache
    ports:
      - "9090:9090"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

volumes:
  models-cache:
  redis-data:
